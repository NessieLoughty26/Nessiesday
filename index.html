<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Nessie's Day" />
  <title>Nessie's Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #faf8fc; }
    body { -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; }
    input, textarea, button, select { font-family: inherit; }
    /* iOS safe area */
    .nav-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── STORAGE ───────────────────────────────────────────────────────────────
    const save = async (k, v) => {
      try {
        localStorage.setItem("nd_" + k, JSON.stringify(v));
        let total = 0;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith("nd_")) total += (localStorage.getItem(key) || "").length;
        }
        if (total > 4 * 1024 * 1024) {
          const el = document.getElementById("nd-toast");
          if (el) {
            el.textContent = "⚠️ Storage nearly full — export a backup!";
            el.style.opacity = 1; el.style.background = "#c04040";
            setTimeout(() => { el.style.opacity = 0; el.style.background = ""; }, 5000);
          }
        }
      } catch (e) {
        if (e.name === "QuotaExceededError") alert("Storage full! Please export a backup from Settings.");
      }
    };
    const load = async (k, fb) => {
      try { const v = localStorage.getItem("nd_" + k); return v ? JSON.parse(v) : fb; } catch { return fb; }
    };

    // ── HELPERS ───────────────────────────────────────────────────────────────
    const toKey    = (d) => d.toISOString().slice(0, 10);
    const today    = () => toKey(new Date());
    const dayName  = () => new Date().toLocaleDateString("en-US", { weekday: "long" });
    const fullDate = () => new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
    const weekKey  = () => { const d = new Date(), day = d.getDay(), mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); return toKey(mon); };
    const monthKey = () => new Date().toISOString().slice(0, 7);

    const DAYS_SHORT = ["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"];
    const MONTHS     = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    const MOODS = [
      { emoji: "🌟", label: "Amazing" },
      { emoji: "😊", label: "Good" },
      { emoji: "😐", label: "Okay" },
      { emoji: "😔", label: "Low" },
      { emoji: "🌧", label: "Rough" },
    ];

    const WATER_GOAL     = 8;
    const DEFAULT_DAILY  = ["Make bed", "Wipe counters", "Dishes", "Quick tidy", "Take out trash"];
    const DEFAULT_WEEKLY = { Mon: ["Vacuum"], Tue: ["Bathroom"], Wed: ["Mop floors"], Thu: ["Dust"], Fri: ["Laundry"], Sat: ["Kitchen deep clean"], Sun: ["Rest / catch up"] };
    const DEFAULT_MONTHLY  = ["Clean fridge", "Wash windows", "Deep clean oven", "Descale kettle"];
    const DEFAULT_AM       = ["Cleanser", "Toner", "Vitamin C", "Moisturiser", "SPF"];
    const DEFAULT_PM       = ["Oil cleanser", "Cleanser", "Toner", "Serum", "Moisturiser", "Eye cream"];
    const DEFAULT_SYMPTOMS = ["Cramps", "Spotting", "Tender breasts", "Tired", "Fatigue", "Acne", "Headache", "Bloating", "Mood swings", "Back pain", "Nausea"];
    const FLOW_LEVELS      = ["Spotting", "Light", "Medium", "Heavy"];
    const WORKOUTS         = ["Walk", "Run", "Yoga", "Gym", "Swim", "Cycle", "Stretch", "Other"];

    const MILESTONES = [
      { id: "first",  emoji: "🌱", label: "First habit done!",    check: (h) => h.some((x) => Object.keys(x.completions).length > 0) },
      { id: "s3",     emoji: "✨", label: "3-day streak",          check: (h) => h.some((x) => x.streak >= 3) },
      { id: "s7",     emoji: "💜", label: "7-day streak",          check: (h) => h.some((x) => x.streak >= 7) },
      { id: "s30",    emoji: "🏆", label: "30-day streak",         check: (h) => h.some((x) => x.streak >= 30) },
      { id: "allday", emoji: "🎯", label: "All habits done today", check: (h, d) => h.length > 0 && h.every((x) => x.completions[d]) },
    ];

    const TABS = [
      { id: "today",    label: "Today",    icon: "☀️" },
      { id: "habits",   label: "Habits",   icon: "💜" },
      { id: "health",   label: "Health",   icon: "🫀" },
      { id: "home",     label: "Home",     icon: "🏠" },
      { id: "calendar", label: "Review",   icon: "📅" },
      { id: "wins",     label: "Wins",     icon: "✨" },
      { id: "settings", label: "Settings", icon: "⚙️" },
    ];

    // ── PALETTE ───────────────────────────────────────────────────────────────
    const C = {
      bg: "#faf8fc", bg2: "#f3eff8", bg3: "#ebe4f4",
      card: "#ffffff",
      violet: "#8b5cf6", violet2: "#a78bfa", lavender: "#c4b5fd",
      rose: "#e879a0", teal: "#5eada0",
      text: "#2d1f3d", text2: "#6b5a7e", text3: "#a094b0",
      border: "rgba(139,92,246,0.18)", border2: "rgba(139,92,246,0.10)",
    };

    const S = {
      root:       { minHeight: "100vh", background: C.bg, fontFamily: "'Nunito', system-ui, sans-serif", color: C.text, maxWidth: 480, margin: "0 auto", paddingBottom: 80 },
      header:     { background: `linear-gradient(180deg, ${C.bg2} 0%, ${C.bg} 100%)`, borderBottom: `1px solid ${C.border}`, padding: "14px 16px 10px", textAlign: "center", position: "sticky", top: 0, zIndex: 10 },
      title:      { fontSize: 22, fontStyle: "italic", fontWeight: 400, margin: "2px 0", color: C.violet, fontFamily: "'Libre Baskerville', Georgia, serif" },
      dateSm:     { fontSize: 10, color: C.text3, margin: 0, letterSpacing: "0.1em", textTransform: "uppercase" },
      nav:        { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: C.card, borderTop: `1px solid ${C.border}`, display: "flex", zIndex: 20, boxShadow: "0 -4px 20px rgba(139,92,246,0.08)", overflowX: "auto" },
      tabBtn:     { flex: "1 0 auto", display: "flex", flexDirection: "column", alignItems: "center", padding: "7px 4px 5px", background: "none", border: "none", cursor: "pointer", color: C.text3, fontFamily: "inherit", minWidth: 52 },
      tabActive:  { color: C.violet, borderTop: `2px solid ${C.violet}` },
      main:       { padding: "10px 12px 14px" },
      col:        { display: "flex", flexDirection: "column", gap: 10 },
      card:       { background: C.card, borderRadius: 16, padding: "12px 14px", boxShadow: "0 2px 12px rgba(139,92,246,0.07)", border: `1px solid ${C.border2}` },
      cardHead:   { marginBottom: 9, paddingBottom: 8, borderBottom: `1px solid ${C.border2}` },
      input:      { flex: 1, background: C.bg2, border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "8px 11px", fontFamily: "inherit", fontSize: 13, color: C.text, outline: "none", boxSizing: "border-box", width: "100%" },
      textarea:   { background: C.bg2, border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "8px 11px", fontFamily: "inherit", fontSize: 13, color: C.text, resize: "vertical", boxSizing: "border-box", outline: "none", width: "100%" },
      label:      { display: "block", fontSize: 10, color: C.text3, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 5, fontWeight: 600 },
      btn:        { background: C.violet, color: "#fff", border: "none", borderRadius: 10, padding: "8px 16px", fontFamily: "inherit", fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" },
      btnOut:     { background: "none", color: C.violet, border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "7px 15px", fontFamily: "inherit", fontSize: 13, cursor: "pointer" },
      ghostBtn:   { background: "none", border: `1px solid ${C.border}`, borderRadius: 8, padding: "5px 10px", fontFamily: "inherit", fontSize: 12, cursor: "pointer", color: C.text2 },
      iconBtn:    { background: "none", border: "none", cursor: "pointer", fontSize: 12, padding: "2px 4px", color: C.text3, fontFamily: "inherit" },
      pill:       { background: C.bg2, border: `1.5px solid ${C.border}`, borderRadius: 20, padding: "4px 12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", color: C.text2 },
      pillOn:     { background: C.violet, color: "#fff", borderColor: C.violet },
      chip:       { background: C.bg3, borderRadius: 20, padding: "3px 9px", fontSize: 12, display: "inline-flex", alignItems: "center", gap: 4, color: C.text2 },
      chipX:      { background: "none", border: "none", cursor: "pointer", color: C.text3, fontSize: 12, padding: 0, lineHeight: 1 },
      moodBtn:    { flex: 1, display: "flex", justifyContent: "center", padding: "8px 3px", borderRadius: 10, border: `1.5px solid transparent`, background: C.bg2, cursor: "pointer" },
      moodOn:     { border: `1.5px solid ${C.violet2}`, background: `rgba(139,92,246,0.08)` },
      modeBtn:    { flex: 1, border: "none", borderRadius: 10, padding: "9px 6px", fontFamily: "inherit", fontSize: 12, cursor: "pointer", fontWeight: 600 },
      check:      { width: 22, height: 22, borderRadius: "50%", border: `2px solid ${C.border}`, background: "none", cursor: "pointer", fontSize: 11, color: "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" },
      checkOn:    { background: C.violet, borderColor: C.violet, color: "#fff" },
      bar:        { height: 5, background: C.bg3, borderRadius: 99, overflow: "hidden", marginBottom: 6 },
      barFill:    { height: "100%", background: `linear-gradient(90deg, ${C.violet}, ${C.violet2})`, borderRadius: 99 },
      streakCard: { background: C.bg2, borderRadius: 10, padding: "8px 10px", textAlign: "center", minWidth: 56, border: `1px solid ${C.border2}` },
      dot:        { width: 20, height: 20, borderRadius: "50%", border: `1.5px solid ${C.border}`, background: "none", cursor: "pointer", fontSize: 9, color: "transparent", display: "inline-flex", alignItems: "center", justifyContent: "center" },
      dotOn:      { background: C.violet, borderColor: C.violet, color: "#fff" },
      arrowBtn:   { background: "none", border: `1.5px solid ${C.border}`, borderRadius: 7, padding: "3px 11px", fontSize: 17, cursor: "pointer", color: C.violet },
      subNav:     { display: "flex", background: C.bg3, borderRadius: 11, padding: 3, gap: 3 },
      subTab:     { flex: 1, padding: "5px 4px", background: "none", border: "none", cursor: "pointer", borderRadius: 8, fontSize: 12, color: C.text3, fontFamily: "inherit" },
      subTabOn:   { background: C.card, color: C.violet, fontWeight: 700, boxShadow: "0 1px 4px rgba(139,92,246,0.12)" },
      empty:      { color: C.text3, fontSize: 12, textAlign: "center", padding: "8px 0", margin: 0, fontStyle: "italic" },
    };

    // ── SHARED COMPONENTS ─────────────────────────────────────────────────────
    function Card({ title, children }) {
      return (
        <div style={S.card}>
          {title && <div style={S.cardHead}><span style={{ fontSize: 13, fontWeight: 700, color: C.violet, fontFamily: "'Libre Baskerville', Georgia, serif", fontStyle: "italic" }}>{title}</span></div>}
          {children}
        </div>
      );
    }
    function Btn({ onClick, children, full, outline, small }) {
      return (
        <button onClick={onClick} style={{ ...(outline ? S.btnOut : S.btn), ...(full ? { width: "100%", boxSizing: "border-box" } : {}), ...(small ? { padding: "5px 10px", fontSize: 12 } : {}) }}>
          {children}
        </button>
      );
    }
    function Collapsible({ label, value, onChange }) {
      const [open, setOpen] = useState(!!value);
      return (
        <div style={{ ...S.card, padding: 0, overflow: "hidden" }}>
          <button onClick={() => setOpen((o) => !o)} style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 14px", background: "none", border: "none", cursor: "pointer", textAlign: "left", fontFamily: "inherit" }}>
            <span style={{ fontSize: 13, color: C.text2, fontWeight: 500 }}>{label}</span>
            <span style={{ color: C.violet2, fontSize: 18, lineHeight: 1 }}>{open ? "−" : "+"}</span>
          </button>
          {open && <textarea value={value} onChange={(e) => onChange(e.target.value)} rows={2} placeholder="Write freely..." style={{ ...S.textarea, margin: "0 12px 12px", width: "calc(100% - 24px)", display: "block" }} />}
        </div>
      );
    }

    // ── MAIN APP ──────────────────────────────────────────────────────────────
    function App() {
      const [tab,       setTab]       = useState("today");
      const [loaded,    setLoaded]    = useState(false);
      const [toast,     setToast]     = useState(null);
      const [celebrate, setCelebrate] = useState(null);

      const [journal,  setJournal]  = useState({});
      const [habits,   setHabits]   = useState([]);
      const [moodLog,  setMoodLog]  = useState({});
      const [badges,   setBadges]   = useState([]);

      const [health,        setHealth]        = useState({});
      const [skincare,      setSkincare]      = useState({});
      const [skincareSteps, setSkincareSteps] = useState({ am: DEFAULT_AM, pm: DEFAULT_PM });
      const [period,        setPeriod]        = useState({});
      const [symptoms,      setSymptoms]      = useState(DEFAULT_SYMPTOMS);

      const [cleaning,     setCleaning]     = useState({});
      const [dailyTasks,   setDailyTasks]   = useState(DEFAULT_DAILY);
      const [weeklyTasks,  setWeeklyTasks]  = useState(DEFAULT_WEEKLY);
      const [monthlyTasks, setMonthlyTasks] = useState(DEFAULT_MONTHLY);

      useEffect(() => {
        (async () => {
          const [j, h, ml, bg, he, sk, sks, pe, sym, cl, dt, wt, mt] = await Promise.all([
            load("j_journal", {}), load("j_habits", []), load("j_moodLog", {}), load("j_badges", []),
            load("j_health", {}), load("j_skincare", {}), load("j_skincareSteps", { am: DEFAULT_AM, pm: DEFAULT_PM }),
            load("j_period", {}), load("j_symptoms", DEFAULT_SYMPTOMS),
            load("j_cleaning", {}), load("j_dailyTasks", DEFAULT_DAILY),
            load("j_weeklyTasks", DEFAULT_WEEKLY), load("j_monthlyTasks", DEFAULT_MONTHLY),
          ]);
          setJournal(j); setHabits(h); setMoodLog(ml); setBadges(bg);
          setHealth(he); setSkincare(sk); setSkincareSteps(sks);
          setPeriod(pe); setSymptoms(sym);
          setCleaning(cl); setDailyTasks(dt); setWeeklyTasks(wt); setMonthlyTasks(mt);
          setLoaded(true);
        })();
      }, []);

      const showToast     = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2400); };
      const showCelebrate = (m)   => { setCelebrate(m); setTimeout(() => setCelebrate(null), 3200); };

      const updateJournal = (field, val) => {
        const next = { ...journal, [today()]: { ...(journal[today()] || {}), [field]: val } };
        setJournal(next); save("j_journal", next);
      };

      const calcStreak = (c) => { let s = 0, d = new Date(); while (true) { const k = toKey(d); if (c[k]) { s++; d.setDate(d.getDate() - 1); } else break; } return s; };
      const checkBadges = (newHabits, newBadges) => {
        const d = today(), earned = [...newBadges]; let got = null;
        MILESTONES.forEach((m) => { if (earned.includes(m.id)) return; if (m.check(newHabits, d)) { earned.push(m.id); got = m; } });
        if (got) { setBadges(earned); save("j_badges", earned); showCelebrate(got); }
      };
      const toggleHabit = (id) => {
        const d = today();
        const next = habits.map((h) => { if (h.id !== id) return h; const c = { ...h.completions, [d]: !h.completions[d] }; return { ...h, completions: c, streak: calcStreak(c) }; });
        setHabits(next); save("j_habits", next);
        const h = next.find((x) => x.id === id);
        if (h && h.completions[d]) { showToast("✓ " + h.name + " done!"); checkBadges(next, badges); }
      };
      const addHabit    = (name) => { if (!name.trim()) return; const next = [...habits, { id: Date.now() + "", name: name.trim(), completions: {}, streak: 0 }]; setHabits(next); save("j_habits", next); };
      const removeHabit = (id)   => { const next = habits.filter((h) => h.id !== id); setHabits(next); save("j_habits", next); };
      const renameHabit = (id, name) => { const next = habits.map((h) => (h.id === id ? { ...h, name } : h)); setHabits(next); save("j_habits", next); };

      const setMood     = (mood) => { const next = { ...moodLog, [today()]: { ...(moodLog[today()] || {}), mood } }; setMoodLog(next); save("j_moodLog", next); };
      const setMoodNote = (note) => { const next = { ...moodLog, [today()]: { ...(moodLog[today()] || {}), note } }; setMoodLog(next); save("j_moodLog", next); };

      const updateHealth = (field, val) => { const n = { ...health, [today()]: { ...(health[today()] || {}), [field]: val } }; setHealth(n); save("j_health", n); };

      const toggleSkincare = (part, step, di) => {
        const wk = weekKey(), dl = DAYS_SHORT[di], curr = (skincare[wk] && skincare[wk][part] && skincare[wk][part][step] && skincare[wk][part][step][dl]) || false;
        const n = { ...skincare, [wk]: { ...(skincare[wk] || {}), [part]: { ...((skincare[wk] || {})[part] || {}), [step]: { ...(((skincare[wk] || {})[part] || {})[step] || {}), [dl]: !curr } } } };
        setSkincare(n); save("j_skincare", n);
      };
      const updateSkincareSteps = (n) => { setSkincareSteps(n); save("j_skincareSteps", n); };

      const toggleSymptom  = (s, date) => { const d = date || today(); const curr = (period[d] && period[d].symptoms) || []; const syms = curr.includes(s) ? curr.filter((x) => x !== s) : [...curr, s]; const n = { ...period, [d]: { ...(period[d] || {}), symptoms: syms } }; setPeriod(n); save("j_period", n); };
      const setFlow        = (flow, date) => { const d = date || today(); const v = (period[d] && period[d].flow) === flow ? null : flow; const n = { ...period, [d]: { ...(period[d] || {}), flow: v } }; setPeriod(n); save("j_period", n); };
      const updateSymptoms = (n) => { setSymptoms(n); save("j_symptoms", n); };

      const toggleCleaning     = (type, name) => { const key = type === "monthly" ? monthKey() : today(); const fk = type + ":" + name + ":" + key; const n = { ...cleaning, [fk]: !cleaning[fk] }; setCleaning(n); save("j_cleaning", n); };
      const updateDailyTasks   = (n) => { setDailyTasks(n);   save("j_dailyTasks", n); };
      const updateWeeklyTasks  = (n) => { setWeeklyTasks(n);  save("j_weeklyTasks", n); };
      const updateMonthlyTasks = (n) => { setMonthlyTasks(n); save("j_monthlyTasks", n); };

      const allData = () => ({ journal, habits, health, moodLog, skincare, period, cleaning, skincareSteps, symptoms, dailyTasks, weeklyTasks, monthlyTasks, badges });
      const restoreData = async (data) => {
        setJournal(data.journal || {}); setHabits(data.habits || []); setHealth(data.health || {});
        setMoodLog(data.moodLog || {}); setSkincare(data.skincare || {}); setPeriod(data.period || {});
        setCleaning(data.cleaning || {}); setSkincareSteps(data.skincareSteps || { am: DEFAULT_AM, pm: DEFAULT_PM });
        setSymptoms(data.symptoms || DEFAULT_SYMPTOMS); setDailyTasks(data.dailyTasks || DEFAULT_DAILY);
        setWeeklyTasks(data.weeklyTasks || DEFAULT_WEEKLY); setMonthlyTasks(data.monthlyTasks || DEFAULT_MONTHLY);
        setBadges(data.badges || []);
        for (const [k, v] of Object.entries(data)) await save("j_" + k, v);
        showToast("Data restored ✅");
      };

      if (!loaded) return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: C.bg, color: C.text3, fontFamily: "'Nunito', system-ui, sans-serif", fontSize: 14, fontStyle: "italic" }}>
          Loading... ✨
        </div>
      );

      const todayH    = health[today()] || {};
      const todayMood = moodLog[today()];
      const todayJ    = journal[today()] || {};

      return (
        <div style={S.root}>
          <div id="nd-toast" style={{ position: "fixed", top: 68, left: "50%", transform: "translateX(-50%)", background: C.violet, color: "#fff", padding: "8px 20px", borderRadius: 40, fontSize: 13, zIndex: 999, boxShadow: "0 4px 18px rgba(139,92,246,0.25)", whiteSpace: "nowrap", opacity: toast ? 1 : 0, transition: "opacity 0.3s", pointerEvents: "none", fontStyle: "italic" }}>
            {toast}
          </div>

          {celebrate && (
            <div style={{ position: "fixed", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, pointerEvents: "none", background: "rgba(139,92,246,0.08)" }}>
              <div style={{ background: "#fff", borderRadius: 24, padding: "32px 40px", textAlign: "center", boxShadow: "0 12px 48px rgba(139,92,246,0.22)", border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 56, marginBottom: 10 }}>{celebrate.emoji}</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: C.violet, fontStyle: "italic", fontFamily: "'Libre Baskerville', Georgia, serif" }}>{celebrate.label}</div>
                <div style={{ fontSize: 12, color: C.text3, marginTop: 4 }}>Badge earned ✦</div>
              </div>
            </div>
          )}

          <header style={S.header}>
            <p style={S.dateSm}>{dayName()}</p>
            <h1 style={S.title}>✦ Nessie's Day</h1>
            <p style={S.dateSm}>{fullDate()}</p>
          </header>

          <main style={S.main}>
            <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0, backgroundImage: `radial-gradient(circle, rgba(139,92,246,0.06) 1.5px, transparent 1.5px)`, backgroundSize: "26px 26px" }} />
            <div style={{ position: "relative", zIndex: 1 }}>
              {tab === "today"    && <TodayTab journal={todayJ} update={updateJournal} todayMood={todayMood} setMood={setMood} setMoodNote={setMoodNote} habits={habits} toggleHabit={toggleHabit} todayHealth={todayH} updateHealth={updateHealth} moodLog={moodLog} />}

    // ── TODAY TAB ─────────────────────────────────────────────────────────────
    function TodayTab({ journal, update, todayMood, setMood, setMoodNote, habits, toggleHabit, todayHealth, updateHealth, moodLog }) {
      const [mode,      setMode]      = useState("normal");
      const [step,      setStep]      = useState(0);
      const [timerOpen, setTimerOpen] = useState(false);
      const [wbInput,   setWbInput]   = useState("");
      const hour      = new Date().getHours();
      const wellbeing = journal.wellbeing ? journal.wellbeing.split("||").filter(Boolean) : [];
      const addWb     = () => { if (!wbInput.trim() || wellbeing.length >= 3) return; update("wellbeing", [...wellbeing, wbInput.trim()].join("||")); setWbInput(""); };

      const done   = habits.filter((h) => h.completions[today()]).length;
      const nudges = [];
      if (!todayMood || !todayMood.mood)              nudges.push("Log your mood");
      if (habits.length > 0 && done === 0)            nudges.push("No habits ticked yet");
      if (!journal.g0 && !journal.g1)                 nudges.push("Add some gratitude");
      if ((todayHealth.water || 0) < 4)               nudges.push("Only " + (todayHealth.water || 0) + " glasses of water 💧");

      const morningSteps = [
        { label: "How are you feeling?",         content: <MoodBlock mood={todayMood && todayMood.mood} onMood={setMood} note={(todayMood && todayMood.note) || ""} onNote={setMoodNote} /> },
        { label: "3 things you're grateful for", content: <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{[0, 1, 2].map((i) => <input key={i} value={journal["g" + i] || ""} onChange={(e) => update("g" + i, e.target.value)} placeholder={(i + 1) + ". Grateful for..."} style={S.input} />)}</div> },
        { label: "3 wellbeing intentions",       content: <div><div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: wellbeing.length ? 8 : 0 }}>{wellbeing.map((w, i) => <span key={i} style={S.chip}>{w}<button onClick={() => update("wellbeing", wellbeing.filter((_, j) => j !== i).join("||"))} style={S.chipX}>×</button></span>)}</div>{wellbeing.length < 3 && <div style={{ display: "flex", gap: 6 }}><input value={wbInput} onChange={(e) => setWbInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addWb()} placeholder="Add intention..." style={S.input} /><Btn onClick={addWb}>+</Btn></div>}</div> },
        { label: "How can I make today easier?", content: <textarea value={journal.easier || ""} onChange={(e) => update("easier", e.target.value)} rows={3} placeholder="Write freely..." style={S.textarea} /> },
      ];
      const eveningSteps = [
        { label: "How did today feel overall?",            content: <MoodBlock mood={todayMood && todayMood.mood} onMood={setMood} note={(todayMood && todayMood.note) || ""} onNote={setMoodNote} /> },
        { label: "How do you want to feel by end of day?", content: <textarea value={journal.endFeel || ""}  onChange={(e) => update("endFeel",  e.target.value)} rows={3} placeholder="Write freely..." style={S.textarea} /> },
        { label: "One thing that brought peace today",     content: <textarea value={journal.peace || ""}    onChange={(e) => update("peace",    e.target.value)} rows={3} placeholder="Write freely..." style={S.textarea} /> },
        { label: "Brain dump — what's taking up space?",   content: <textarea value={journal.distract || ""} onChange={(e) => update("distract", e.target.value)} rows={3} placeholder="Get it out..." style={S.textarea} /> },
      ];
      const steps = mode === "morning" ? morningSteps : eveningSteps;

      if (mode === "morning" || mode === "evening") {
        const s = steps[step], isLast = step === steps.length - 1;
        return (
          <div style={S.col}>
            <div style={{ background: C.bg2, borderRadius: 14, padding: "14px 16px", border: `1px solid ${C.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.violet, fontStyle: "italic", fontFamily: "'Libre Baskerville', Georgia, serif" }}>
                  {mode === "morning" ? "Morning check-in" : "Evening wind-down"}
                </span>
                <button onClick={() => setMode("normal")} style={{ ...S.iconBtn, fontSize: 18 }}>×</button>
              </div>
              <div style={{ fontSize: 10, color: C.text3, letterSpacing: "0.08em" }}>Step {step + 1} of {steps.length}</div>
              <div style={{ ...S.bar, marginTop: 8, marginBottom: 0 }}><div style={{ ...S.barFill, width: ((step + 1) / steps.length * 100) + "%" }} /></div>
            </div>
            <Card title={s.label}>{s.content}</Card>
            <div style={{ display: "flex", gap: 8 }}>
              {step > 0 && <Btn outline onClick={() => setStep((i) => i - 1)}>← Back</Btn>}
              <Btn onClick={() => isLast ? setMode("normal") : setStep((i) => i + 1)} full={step === 0}>{isLast ? "Done ✓" : "Next →"}</Btn>
            </div>
          </div>
        );
      }

      return (
        <div style={S.col}>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { setMode("morning"); setStep(0); }} style={{ ...S.modeBtn, background: hour < 12 ? C.violet : C.bg2, color: hour < 12 ? "#fff" : C.text2 }}>
              {hour < 12 ? "☀️ " : ""}Morning
            </button>
            <button onClick={() => { setMode("evening"); setStep(0); }} style={{ ...S.modeBtn, background: hour >= 18 ? C.violet : C.bg2, color: hour >= 18 ? "#fff" : C.text2 }}>
              {hour >= 18 ? "🌙 " : ""}Evening
            </button>
            <button onClick={() => setTimerOpen((o) => !o)} style={{ ...S.modeBtn, background: timerOpen ? C.violet2 : C.bg2, color: timerOpen ? "#fff" : C.text2 }}>
              ⏱ Timer
            </button>
          </div>

          {timerOpen && <FocusTimer />}

          {nudges.length > 0 && (
            <div style={{ background: `rgba(139,92,246,0.06)`, borderRadius: 12, padding: "10px 14px", border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 10, color: C.violet, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Still to do</div>
              {nudges.map((n, i) => <div key={i} style={{ fontSize: 12, color: C.text2, marginBottom: i < nudges.length - 1 ? 3 : 0 }}>✦ {n}</div>)}
            </div>
          )}

          <Card title="Quick log">
            <MoodBlock mood={todayMood && todayMood.mood} onMood={setMood} note={(todayMood && todayMood.note) || ""} onNote={setMoodNote} />
            <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.border2}` }}>
              <div style={{ fontSize: 10, color: C.text3, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 5 }}>Water · {todayHealth.water || 0}/{WATER_GOAL}</div>
              <div style={{ display: "flex", gap: 2, flexWrap: "wrap" }}>
                {Array.from({ length: WATER_GOAL }).map((_, i) => (
                  <button key={i} onClick={() => updateHealth("water", i < (todayHealth.water || 0) ? i : i + 1)} style={{ fontSize: 20, background: "none", border: "none", cursor: "pointer", opacity: i < (todayHealth.water || 0) ? 1 : 0.2, padding: "1px" }}>💧</button>
                ))}
              </div>
            </div>
            {habits.length > 0 && (
              <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.border2}` }}>
                <div style={{ fontSize: 10, color: C.text3, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6, fontWeight: 600 }}>Habits</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {habits.map((h) => {
                    const done = !!h.completions[today()];
                    return <button key={h.id} onClick={() => toggleHabit(h.id)} style={{ ...S.pill, ...(done ? { ...S.pillOn, opacity: 0.75 } : {}) }}>{done ? "✓ " : ""}{h.name}</button>;
                  })}
                </div>
              </div>
            )}
          </Card>

          <Card title="Gratitude">
            {[0, 1, 2].map((i) => <input key={i} value={journal["g" + i] || ""} onChange={(e) => update("g" + i, e.target.value)} placeholder={(i + 1) + ". Grateful for..."} style={{ ...S.input, marginBottom: i < 2 ? 6 : 0 }} />)}
          </Card>

          <Card title="Intentions (3)">
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: wellbeing.length ? 8 : 0 }}>
              {wellbeing.map((w, i) => <span key={i} style={S.chip}>{w}<button onClick={() => update("wellbeing", wellbeing.filter((_, j) => j !== i).join("||"))} style={S.chipX}>×</button></span>)}
            </div>
            {wellbeing.length < 3 && (
              <div style={{ display: "flex", gap: 6 }}>
                <input value={wbInput} onChange={(e) => setWbInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addWb()} placeholder="Add intention..." style={S.input} />
                <Btn onClick={addWb}>+</Btn>
              </div>
            )}
          </Card>

          {[
            { key: "feel",     label: "How do I feel right now?" },
            { key: "easier",   label: "How can I make today easier?" },
            { key: "distract", label: "What is taking up mental energy?" },
            { key: "idealDay", label: "My ideal day looks like..." },
            { key: "peace",    label: "One thing for more peace today" },
            { key: "endFeel",  label: "How I want to feel by end of day" },
          ].map((p) => <Collapsible key={p.key} label={p.label} value={journal[p.key] || ""} onChange={(v) => update(p.key, v)} />)}
        </div>
      );
    }

    function MoodBlock({ mood, onMood, note, onNote }) {
      return (
        <div>
          <div style={{ display: "flex", gap: 5, justifyContent: "space-between" }}>
            {MOODS.map((m) => (
              <button key={m.label} onClick={() => onMood(m.label)} title={m.label} style={{ ...S.moodBtn, ...(mood === m.label ? S.moodOn : {}) }}>
                <span style={{ fontSize: 22 }}>{m.emoji}</span>
              </button>
            ))}
          </div>
          {mood && <input value={note} onChange={(e) => onNote(e.target.value)} placeholder="Add a note..." style={{ ...S.input, marginTop: 8 }} />}
        </div>
      );
    }

    function FocusTimer() {
      const PRESETS = [{ label: "5 min", s: 300 }, { label: "10 min", s: 600 }, { label: "25 min", s: 1500 }, { label: "45 min", s: 2700 }];
      const [total,   setTotal]   = useState(1500);
      const [rem,     setRem]     = useState(1500);
      const [running, setRunning] = useState(false);
      const [done,    setDone]    = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        if (running) { ref.current = setInterval(() => { setRem((r) => { if (r <= 1) { clearInterval(ref.current); setRunning(false); setDone(true); return 0; } return r - 1; }); }, 1000); }
        else clearInterval(ref.current);
        return () => clearInterval(ref.current);
      }, [running]);

      const reset = (s) => { clearInterval(ref.current); setTotal(s); setRem(s); setRunning(false); setDone(false); };
      const mins = Math.floor(rem / 60), secs = rem % 60, pct = (rem / total) * 100;
      const r = 34, circ = 2 * Math.PI * r;

      return (
        <div style={{ ...S.card, textAlign: "center" }}>
          <div style={{ fontSize: 10, color: C.text3, marginBottom: 10, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 600 }}>Focus timer</div>
          <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 14, flexWrap: "wrap" }}>
            {PRESETS.map((p) => <button key={p.s} onClick={() => reset(p.s)} style={{ ...S.pill, ...(total === p.s ? S.pillOn : {}) }}>{p.label}</button>)}
          </div>
          <div style={{ position: "relative", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
            <svg width="90" height="90" style={{ transform: "rotate(-90deg)" }}>
              <circle cx="45" cy="45" r={r} fill="none" stroke={C.bg3} strokeWidth="6" />
              <circle cx="45" cy="45" r={r} fill="none" stroke={done ? C.teal : C.violet} strokeWidth="6"
                strokeDasharray={circ} strokeDashoffset={circ * (1 - pct / 100)} strokeLinecap="round"
                style={{ transition: "stroke-dashoffset 1s linear" }} />
            </svg>
            <div style={{ position: "absolute", textAlign: "center" }}>
              <div style={{ fontSize: done ? 13 : 18, fontWeight: 700, color: done ? C.teal : C.violet, fontStyle: "italic" }}>
                {done ? "Done!" : String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0")}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
            <button onClick={() => setRunning((r) => !r)} style={{ ...S.btn, minWidth: 80 }}>{running ? "Pause" : "Start"}</button>
            <button onClick={() => reset(total)} style={S.ghostBtn}>Reset</button>
          </div>
        </div>
      );
    }

    // ── HABITS TAB ────────────────────────────────────────────────────────────
    function HabitsTab({ habits, toggle, add, remove, rename }) {
      const [input,   setInput]   = useState("");
      const [editing, setEditing] = useState(null);
      const [editVal, setEditVal] = useState("");
      const d = today(), done = habits.filter((h) => h.completions[d]).length;

      return (
        <div style={S.col}>
          <Card title="Today's habits">
            <div style={S.bar}><div style={{ ...S.barFill, width: (habits.length ? (done / habits.length) * 100 : 0) + "%" }} /></div>
            <p style={{ fontSize: 11, color: C.text3, textAlign: "center", margin: "0 0 10px", fontStyle: "italic" }}>
              {done}/{habits.length} done {done === habits.length && habits.length > 0 ? "— great job! 🎉" : ""}
            </p>
            {habits.length === 0 && <p style={S.empty}>Add your first habit below ✦</p>}
            {habits.map((h) => {
              const isDone = !!h.completions[d];
              if (editing === h.id) return (
                <div key={h.id} style={{ display: "flex", gap: 6, padding: "7px 0", borderBottom: `1px solid ${C.border2}` }}>
                  <input value={editVal} onChange={(e) => setEditVal(e.target.value)} onKeyDown={(e) => e.key === "Enter" && (rename(h.id, editVal), setEditing(null))} style={{ ...S.input, flex: 1 }} autoFocus />
                  <Btn onClick={() => { rename(h.id, editVal); setEditing(null); }}>Save</Btn>
                  <button onClick={() => setEditing(null)} style={S.ghostBtn}>Cancel</button>
                </div>
              );
              return (
                <div key={h.id} style={{ display: "flex", alignItems: "center", gap: 8, borderBottom: `1px solid ${C.border2}`, padding: "8px 0" }}>
                  <button onClick={() => toggle(h.id)} style={{ ...S.check, ...(isDone ? S.checkOn : {}) }}>{isDone ? "✓" : ""}</button>
                  <span style={{ flex: 1, fontSize: 13, ...(isDone ? { textDecoration: "line-through", opacity: 0.45 } : {}) }}>{h.name}</span>
                  <span style={{ fontSize: 11, color: C.violet2, fontWeight: 700 }}>{h.streak}d</span>
                  <button onClick={() => { setEditing(h.id); setEditVal(h.name); }} style={S.iconBtn}>✏️</button>
                  <button onClick={() => remove(h.id)} style={S.iconBtn}>🗑️</button>
                </div>
              );
            })}
            <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
              <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && (add(input), setInput(""))} placeholder="New habit..." style={S.input} />
              <Btn onClick={() => { add(input); setInput(""); }}>Add</Btn>
            </div>
          </Card>
          {habits.length > 0 && (
            <Card title="Streaks">
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {habits.map((h) => (
                  <div key={h.id} style={S.streakCard}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: C.violet }}>{h.streak}</div>
                    <div style={{ fontSize: 9, color: C.text3, marginTop: 2, maxWidth: 64, textAlign: "center", lineHeight: 1.3 }}>{h.name}</div>
                  </div>
                ))}
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ── HEALTH TAB ────────────────────────────────────────────────────────────
    function HealthTab({ health, updateHealth, skincare, skincareSteps, toggleSkincare, period, toggleSymptom, setFlow, symptoms }) {

        <div style={S.col}>
          <div style={S.subNav}>

      const [mealOpen, setMealOpen] = useState(false);
      const meals    = health.meals || { breakfast: "", lunch: "", dinner: "", snacks: "" };

      return (
        <div style={S.col}>
          <Card title={"Water · " + (health.water || 0) + "/" + WATER_GOAL}>
            <div style={{ display: "flex", gap: 2, flexWrap: "wrap" }}>
              {Array.from({ length: WATER_GOAL }).map((_, i) => (
                <button key={i} onClick={() => updateHealth("water", i < (health.water || 0) ? i : i + 1)} style={{ fontSize: 22, background: "none", border: "none", cursor: "pointer", opacity: i < (health.water || 0) ? 1 : 0.2, padding: "2px" }}>💧</button>
              ))}
            </div>
          </Card>
          <Card>

          <Card title="Workout">
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {WORKOUTS.map((w) => (

              </div>

      return (
        <div style={S.col}>
          <div style={S.subNav}>
            <button onClick={() => setPart("am")} style={{ ...S.subTab, ...(part === "am" ? S.subTabOn : {}) }}>AM</button>
            <button onClick={() => setPart("pm")} style={{ ...S.subTab, ...(part === "pm" ? S.subTabOn : {}) }}>PM</button>
          </div>
          <Card>
            <div style={{ overflowX: "auto" }}>
              <div style={{ display: "grid", gridTemplateColumns: "auto " + DAYS_SHORT.map(() => "1fr").join(" "), gap: 2, alignItems: "center", minWidth: 300 }}>
                <div />
                {DAYS_SHORT.map((d) => <div key={d} style={{ fontSize: 9, color: C.text3, textAlign: "center", fontWeight: 700, padding: "3px 0" }}>{d}</div>)}
                {stepList.map((step) => {
                  const wkData = skincare[wk] || {};
                  const partData = wkData[part] || {};
                  const row = partData[step] || {};
                  const done = DAYS_SHORT.filter((d) => row[d]).length;
                  return [
                    <div key={step + "l"} style={{ fontSize: 11, color: C.text2, paddingRight: 6, whiteSpace: "nowrap" }}>{step} <span style={{ fontSize: 9, color: done === 7 ? C.teal : C.violet2 }}>{done}/7</span></div>,
                    ...DAYS_SHORT.map((d, di) => (
                      <button key={d} onClick={() => toggle(part, step, di)} style={{ ...S.dot, ...(row[d] ? S.dotOn : {}), margin: "0 auto" }}>✓</button>
                    )),
                  ];
                })}
              </div>
            </div>
          </Card>
        </div>
      );
    }

    function CycleTab({ period, toggleSymptom, setFlow, symptoms }) {
      const [logDate, setLogDate] = useState(today());
      const [calDate, setCalDate] = useState(new Date());
      const dayD    = period[logDate] || {};
      const isToday = logDate === today();
      const yr = calDate.getFullYear(), mo = calDate.getMonth();
      const daysInMonth = new Date(yr, mo + 1, 0).getDate();
      const firstOffset = (new Date(yr, mo, 1).getDay() + 6) % 7;
      const dkCal = (d) => yr + "-" + String(mo + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      const prevMo = () => { const d = new Date(calDate); d.setMonth(d.getMonth() - 1); setCalDate(d); };
      const nextMo = () => { const d = new Date(calDate); d.setMonth(d.getMonth() + 1); if (d <= new Date()) setCalDate(d); };
      const fmtLogDate = (ds) => { if (ds === today()) return "Today"; return new Date(ds + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }); };

      return (
        <div style={S.col}>
          <Card title={calDate.toLocaleDateString("en-US", { month: "long", year: "numeric" })}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <button onClick={prevMo} style={S.arrowBtn}>{"<"}</button>
              <span style={{ fontSize: 11, color: C.text3 }}>Tap a day to log</span>
              <button onClick={nextMo} style={S.arrowBtn}>{">"}</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 4 }}>
              {DAYS_SHORT.map((d) => <div key={d} style={{ textAlign: "center", fontSize: 9, color: C.text3, fontWeight: 700 }}>{d}</div>)}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
              {Array.from({ length: firstOffset }).map((_, i) => <div key={"e" + i} />)}
              {Array.from({ length: daysInMonth }).map((_, i) => {
                const day = i + 1, ds = dkCal(day);
                const isFuture = ds > today(), isTod = ds === today(), isSel = ds === logDate;
                const hasFlow = !!(period[ds] && period[ds].flow);
                return (
                  <button key={day} onClick={() => !isFuture && setLogDate(ds)} disabled={isFuture}
                    style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "3px 1px", borderRadius: 7, border: "none", cursor: isFuture ? "default" : "pointer", background: isSel ? C.violet : hasFlow ? "#f5dada" : "transparent", outline: isTod ? `2px solid ${C.violet2}` : "none", outlineOffset: "-2px", opacity: isFuture ? 0.25 : 1, minHeight: 30 }}>
                    <span style={{ fontSize: 11, color: isSel ? "#fff" : isTod ? C.violet : C.text, fontWeight: isTod || isSel ? 700 : 400 }}>{day}</span>
                    {hasFlow && <div style={{ width: 4, height: 4, borderRadius: "50%", background: isSel ? "rgba(255,255,255,0.8)" : "#c47a7a", marginTop: 1 }} />}
                  </button>
                );
              })}
            </div>
          </Card>
          <Card title={"Log · " + fmtLogDate(logDate)}>
            {!isToday && (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, padding: "6px 10px", background: C.bg2, borderRadius: 8 }}>
                <span style={{ fontSize: 12, color: C.text2 }}>Logging past day</span>
                <button onClick={() => setLogDate(today())} style={{ ...S.pill, fontSize: 11, padding: "3px 10px" }}>Back to today</button>
              </div>
            )}
            <div style={{ marginBottom: 12 }}>
              <label style={S.label}>Flow {dayD.flow && <span style={{ color: "#c47a7a", fontSize: 10 }}>· {dayD.flow}</span>}</label>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {FLOW_LEVELS.map((f) => <button key={f} onClick={() => setFlow(f, logDate)} style={{ ...S.pill, ...(dayD.flow === f ? { ...S.pillOn, background: "#c47a7a", borderColor: "#c47a7a" } : {}) }}>{f}</button>)}
              </div>
            </div>
            <div>
              <label style={S.label}>Symptoms</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {symptoms.map((s) => {
                  const active = (dayD.symptoms || []).includes(s);
                  return <button key={s} onClick={() => toggleSymptom(s, logDate)} style={{ ...S.pill, ...(active ? S.pillOn : {}) }}>{s}</button>;
                })}
              </div>
            </div>
          </Card>
        </div>
      );
    }

    // ── HOME TAB ──────────────────────────────────────────────────────────────
    function HomeTab({ cleaning, toggle, dailyTasks, weeklyTasks, monthlyTasks }) {
      const dayOfWeek      = new Date().toLocaleDateString("en-US", { weekday: "long" }).slice(0, 3);
      const weeklyForToday = weeklyTasks[dayOfWeek] || [];
      const ChoreItem = ({ done, onToggle, label, last }) => (
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 0", borderBottom: last ? "none" : `1px solid ${C.border2}` }}>
          <button onClick={onToggle} style={{ ...S.check, ...(done ? S.checkOn : {}) }}>✓</button>
          <span style={{ fontSize: 13, flex: 1, textDecoration: done ? "line-through" : "none", opacity: done ? 0.45 : 1 }}>{label}</span>
        </div>
      );
      return (
        <div style={S.col}>
          <Card title="Daily chores">
            {dailyTasks.map((t, i) => <ChoreItem key={i} done={!!cleaning["daily:" + t + ":" + today()]} onToggle={() => toggle("daily", t)} label={t} last={i === dailyTasks.length - 1} />)}
          </Card>
          {weeklyForToday.length > 0 && (
            <Card title={"Today's weekly · " + dayOfWeek}>
              {weeklyForToday.map((t, i) => <ChoreItem key={i} done={!!cleaning["weekly:" + t + ":" + today()]} onToggle={() => toggle("weekly", t)} label={t} last={i === weeklyForToday.length - 1} />)}
            </Card>
          )}
          <Card title={"Monthly · " + MONTHS[new Date().getMonth()]}>
            {monthlyTasks.map((t, i) => <ChoreItem key={i} done={!!cleaning["monthly:" + t + ":" + monthKey()]} onToggle={() => toggle("monthly", t)} label={t} last={i === monthlyTasks.length - 1} />)}
          </Card>
        </div>
      );
    }

    // ── CALENDAR / REVIEW TAB ─────────────────────────────────────────────────
    function CalendarTab({ journal, habits, health, moodLog, period }) {
      const now = new Date();
      const [yr,  setYr]  = useState(now.getFullYear());
      const [mo,  setMo]  = useState(now.getMonth());
      const [sel, setSel] = useState(null);
      const daysInMonth = new Date(yr, mo + 1, 0).getDate();
      const firstOffset = (new Date(yr, mo, 1).getDay() + 6) % 7;
      const dk = (d) => yr + "-" + String(mo + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      const prevMo = () => { if (mo === 0) { setYr((y) => y - 1); setMo(11); } else setMo((m) => m - 1); setSel(null); };
      const nextMo = () => {
        const nm = mo === 11 ? 0 : mo + 1, ny = mo === 11 ? yr + 1 : yr;
        if (ny > now.getFullYear() || (ny === now.getFullYear() && nm > now.getMonth())) return;
        setMo(nm); if (mo === 11) setYr((y) => y + 1); setSel(null);
      };
      const score = (ds) => {
        let pts = 0, tot = 0;
        if (moodLog[ds] && moodLog[ds].mood) { tot += 2; const mi = MOODS.findIndex((m) => m.label === moodLog[ds].mood); pts += mi <= 1 ? 2 : mi === 2 ? 1 : 0; }
        if (habits.length > 0) { tot += 1; pts += habits.filter((h) => h.completions[ds]).length / habits.length; }
        if (journal[ds] && Object.values(journal[ds]).some((v) => v)) { tot += 1; pts += 1; }
        return tot > 0 ? pts / tot : null;
      };
      const dotColor = (ds) => { const s = score(ds); if (s === null) return null; if (s >= 0.7) return C.teal; if (s >= 0.35) return C.violet2; return C.rose; };
      const selData = sel ? {
        mood: moodLog[sel], note: journal[sel],
        hab: habits.filter((h) => h.completions[sel]),
        water: (health[sel] && health[sel].water) || 0,
        flow: period[sel] && period[sel].flow,
        symptoms: (period[sel] && period[sel].symptoms) || [],
      } : null;

      return (
        <div style={S.col}>
          <Card>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <button onClick={prevMo} style={S.arrowBtn}>{"<"}</button>
              <span style={{ fontSize: 14, fontWeight: 700, color: C.violet }}>{MONTHS[mo]} {yr}</span>
              <button onClick={nextMo} style={S.arrowBtn}>{">"}</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 6 }}>
              {DAYS_SHORT.map((d) => <div key={d} style={{ textAlign: "center", fontSize: 9, color: C.text3, fontWeight: 700, padding: "3px 0" }}>{d}</div>)}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
              {Array.from({ length: firstOffset }).map((_, i) => <div key={"e" + i} />)}
              {Array.from({ length: daysInMonth }).map((_, i) => {
                const day = i + 1, ds = dk(day), isFuture = ds > today(), isTod = ds === today(), isSel = ds === sel;
                const dc = dotColor(ds);
                return (
                  <button key={day} onClick={() => !isFuture && setSel(isSel ? null : ds)} disabled={isFuture}
                    style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "4px 2px", borderRadius: 8, border: "none", cursor: isFuture ? "default" : "pointer", background: isSel ? C.bg3 : "transparent", opacity: isFuture ? 0.25 : 1, outline: isTod ? `2px solid ${C.violet2}` : "none", outlineOffset: "-2px" }}>
                    <span style={{ fontSize: 11, color: isTod ? C.violet : C.text, fontWeight: isTod ? 700 : 400 }}>{day}</span>
                    {dc && <div style={{ width: 5, height: 5, borderRadius: "50%", background: dc, marginTop: 2 }} />}
                  </button>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 8, justifyContent: "center" }}>
              {[[C.teal, "Great"], [C.violet2, "Okay"], [C.rose, "Low"]].map(([c, l]) => (
                <div key={l} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: c }} /><span style={{ fontSize: 9, color: C.text3 }}>{l}</span>
                </div>
              ))}
            </div>
          </Card>
          {selData && (
            <Card title={new Date(sel + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}>
              {selData.mood && selData.mood.mood && <div style={{ marginBottom: 8 }}><span style={{ fontSize: 11, color: C.text3 }}>Mood: </span><span style={{ fontSize: 13 }}>{(MOODS.find((m) => m.label === selData.mood.mood) || {}).emoji} {selData.mood.mood}</span></div>}
              {selData.mood && selData.mood.note && <div style={{ fontSize: 12, color: C.text2, fontStyle: "italic", marginBottom: 8 }}>"{selData.mood.note}"</div>}
              {selData.water > 0 && <div style={{ marginBottom: 6 }}><span style={{ fontSize: 11, color: C.text3 }}>Water: </span><span style={{ fontSize: 12 }}>{"💧".repeat(selData.water)}</span></div>}
              {selData.hab.length > 0 && <div style={{ marginBottom: 6 }}><span style={{ fontSize: 11, color: C.text3 }}>Habits: </span><span style={{ fontSize: 12 }}>{selData.hab.map((h) => h.name).join(", ")}</span></div>}
              {selData.flow && <div style={{ marginBottom: 6 }}><span style={{ fontSize: 11, color: C.text3 }}>Flow: </span><span style={{ fontSize: 12, color: "#c47a7a" }}>{selData.flow}</span></div>}
              {selData.symptoms.length > 0 && <div style={{ marginBottom: 6 }}><span style={{ fontSize: 11, color: C.text3 }}>Symptoms: </span><span style={{ fontSize: 12 }}>{selData.symptoms.join(", ")}</span></div>}
              {selData.note && selData.note.feel && <div style={{ marginBottom: 6 }}><span style={{ fontSize: 11, color: C.text3 }}>How I felt: </span><span style={{ fontSize: 12 }}>{selData.note.feel}</span></div>}
              {selData.note && [selData.note.g0, selData.note.g1, selData.note.g2].filter(Boolean).length > 0 && (
                <div><span style={{ fontSize: 11, color: C.text3 }}>Grateful for: </span><span style={{ fontSize: 12 }}>{[selData.note.g0, selData.note.g1, selData.note.g2].filter(Boolean).join(", ")}</span></div>
              )}
            </Card>
          )}
        </div>
      );
    }

    // ── WINS TAB ──────────────────────────────────────────────────────────────
    function WinsTab({ habits, badges, moodLog, journal }) {
      const wins = []; let habitDays = 0, journalDays = 0, bestStreak = 0;
      for (let i = 0; i < 7; i++) {
        const d = new Date(); d.setDate(d.getDate() - i); const k = toKey(d);
        if (habits.length && habits.every((h) => h.completions[k])) habitDays++;
        if (journal[k] && Object.values(journal[k]).some((v) => v)) journalDays++;
      }
      habits.forEach((h) => { if (h.streak > bestStreak) bestStreak = h.streak; });
      const goodMoods = Object.values(moodLog).filter((m) => m.mood === "Amazing" || m.mood === "Good").length;
      if (habitDays >= 3)   wins.push("All habits done " + habitDays + " days this week 🎯");
      if (journalDays >= 4) wins.push("Journalled " + journalDays + " days this week 📝");
      if (bestStreak >= 5)  wins.push(bestStreak + "-day streak going strong 🔥");
      if (goodMoods >= 10)  wins.push(goodMoods + " great mood days total 🌟");

      const earned = MILESTONES.filter((m) => badges.includes(m.id));
      const locked  = MILESTONES.filter((m) => !badges.includes(m.id));

      return (
        <div style={S.col}>
          {wins.length > 0 && (
            <div style={{ background: `rgba(139,92,246,0.06)`, borderRadius: 14, padding: "12px 15px", border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 10, color: C.violet, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 }}>This week's wins</div>
              {wins.map((w, i) => <div key={i} style={{ fontSize: 13, color: C.text2, marginBottom: i < wins.length - 1 ? 5 : 0 }}>✦ {w}</div>)}
            </div>
          )}
          <Card title="Badges">
            {earned.length === 0 && <p style={S.empty}>Complete habits to earn badges ✦</p>}
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: earned.length && locked.length ? 12 : 0 }}>
              {earned.map((m) => (
                <div key={m.id} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 30 }}>{m.emoji}</div>
                  <div style={{ fontSize: 9, color: C.violet, marginTop: 3, maxWidth: 56, lineHeight: 1.3, fontWeight: 700 }}>{m.label}</div>
                </div>
              ))}
            </div>
            {locked.length > 0 && (
              <div>
                <div style={{ fontSize: 10, color: C.text3, marginBottom: 8, marginTop: earned.length ? 8 : 0, fontStyle: "italic" }}>Still to unlock</div>
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  {locked.map((m) => (
                    <div key={m.id} style={{ textAlign: "center", opacity: 0.22 }}>
                      <div style={{ fontSize: 30 }}>{m.emoji}</div>
                      <div style={{ fontSize: 9, color: C.text3, marginTop: 3, maxWidth: 56, lineHeight: 1.3 }}>{m.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </Card>
          <Card title="Mood this week">
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
              {Array.from({ length: 7 }).map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6 - i)); const k = toKey(d);
                const mood = moodLog[k] && moodLog[k].mood;
                const mo   = MOODS.find((m) => m.label === mood);
                const isToday = k === today();
                return (
                  <div key={i} style={{ textAlign: "center", flex: 1 }}>
                    <div style={{ fontSize: 8, color: C.text3, marginBottom: 3 }}>{d.toLocaleDateString("en-US", { weekday: "short" })}</div>
                    <div style={{ fontSize: 22, opacity: mood ? 1 : 0.18 }}>{mo ? mo.emoji : "·"}</div>
                    {isToday && <div style={{ width: 4, height: 4, borderRadius: "50%", background: C.violet, margin: "3px auto 0" }} />}
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      );
    }

    // ── SETTINGS TAB ──────────────────────────────────────────────────────────
    function SettingsTab({ skincareSteps, updateSkincareSteps, symptoms, updateSymptoms, dailyTasks, updateDailyTasks, weeklyTasks, updateWeeklyTasks, monthlyTasks, updateMonthlyTasks, allData, restoreData, showToast }) {
      const [sub, setSub]           = useState("tasks");
      const [dayOfWeek, setDayOfWeek] = useState("Mon");
      const WEEK_DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

      const exportData = () => {
        const blob = new Blob([JSON.stringify(allData(), null, 2)], { type: "application/json" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a"); a.href = url; a.download = "nessies-day-backup.json"; a.click();
        URL.revokeObjectURL(url); showToast("Backup downloaded ✅");
      };
      const importData = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { try { restoreData(JSON.parse(ev.target.result)); } catch { showToast("Invalid file ❌"); } };
        reader.readAsText(file);
        e.target.value = "";
      };

      return (
        <div style={S.col}>
          <div style={S.subNav}>
            {["tasks", "skincare", "cycle", "backup"].map((s) => (
              <button key={s} onClick={() => setSub(s)} style={{ ...S.subTab, ...(sub === s ? S.subTabOn : {}), fontSize: 11 }}>
                {s === "tasks" ? "🏠 Tasks" : s === "skincare" ? "✨ Skin" : s === "cycle" ? "🌸 Cycle" : "💾 Backup"}
              </button>
            ))}
          </div>

          {sub === "tasks" && (
            <div style={S.col}>
              <EditableList title="Daily tasks" items={dailyTasks} onUpdate={updateDailyTasks} placeholder="Add daily task..." />
              <Card title="Weekly tasks">
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 10 }}>
                  {WEEK_DAYS.map((d) => (
                    <button key={d} onClick={() => setDayOfWeek(d)} style={{ ...S.pill, ...(dayOfWeek === d ? S.pillOn : {}) }}>{d}</button>
                  ))}
                </div>
                <InlineList items={weeklyTasks[dayOfWeek] || []} onUpdate={(n) => updateWeeklyTasks({ ...weeklyTasks, [dayOfWeek]: n })} placeholder={"Add task for " + dayOfWeek + "..."} />
              </Card>
              <EditableList title="Monthly tasks" items={monthlyTasks} onUpdate={updateMonthlyTasks} placeholder="Add monthly task..." />
            </div>
          )}

          {sub === "skincare" && (
            <div style={S.col}>
              <EditableList title="AM routine" items={skincareSteps.am || []} onUpdate={(n) => updateSkincareSteps({ ...skincareSteps, am: n })} placeholder="Add AM step..." />
              <EditableList title="PM routine" items={skincareSteps.pm || []} onUpdate={(n) => updateSkincareSteps({ ...skincareSteps, pm: n })} placeholder="Add PM step..." />
            </div>
          )}

          {sub === "cycle" && (
            <EditableList title="Cycle symptoms" items={symptoms} onUpdate={updateSymptoms} placeholder="Add symptom..." />
          )}

          {sub === "backup" && (
            <Card title="Backup & restore">
              <p style={{ fontSize: 12, color: C.text2, margin: "0 0 14px" }}>Export your data as JSON or restore from a previous backup. Your data is saved locally in this browser.</p>
              <Btn full onClick={exportData}>⬇ Export backup</Btn>
              <div style={{ marginTop: 10 }}>
                <label style={{ ...S.btn, display: "block", textAlign: "center", cursor: "pointer", boxSizing: "border-box", width: "100%", borderRadius: 10 }}>
                  ⬆ Import backup
                  <input type="file" accept=".json" onChange={importData} style={{ display: "none" }} />
                </label>
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ── EDITABLE LIST ─────────────────────────────────────────────────────────
    function EditableList({ title, items, onUpdate, placeholder }) {
      const [input,   setInput]   = useState("");
      const [editing, setEditing] = useState(null);
      const [editVal, setEditVal] = useState("");
      const add      = () => { if (!input.trim()) return; onUpdate([...items, input.trim()]); setInput(""); };
      const remove   = (i) => onUpdate(items.filter((_, j) => j !== i));
      const saveEdit = (i) => { onUpdate(items.map((x, j) => (j === i ? editVal : x))); setEditing(null); };
      const move     = (i, dir) => { const a = [...items]; [a[i], a[i + dir]] = [a[i + dir], a[i]]; onUpdate(a); };
      return (
        <Card title={title}>
          {items.map((item, i) =>
            editing === i ? (
              <div key={i} style={{ display: "flex", gap: 6, padding: "5px 0", borderBottom: `1px solid ${C.border2}` }}>
                <input value={editVal} onChange={(e) => setEditVal(e.target.value)} onKeyDown={(e) => e.key === "Enter" && saveEdit(i)} style={{ ...S.input, flex: 1 }} autoFocus />
                <Btn onClick={() => saveEdit(i)}>Save</Btn>
                <button onClick={() => setEditing(null)} style={S.ghostBtn}>✕</button>
              </div>
            ) : (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, borderBottom: `1px solid ${C.border2}`, padding: "5px 0" }}>
                <div style={{ display: "flex", flexDirection: "column" }}>
                  <button onClick={() => i > 0 && move(i, -1)} style={{ ...S.iconBtn, fontSize: 9, padding: "1px 3px", opacity: i === 0 ? 0.3 : 1 }}>▲</button>
                  <button onClick={() => i < items.length - 1 && move(i, 1)} style={{ ...S.iconBtn, fontSize: 9, padding: "1px 3px", opacity: i === items.length - 1 ? 0.3 : 1 }}>▼</button>
                </div>
                <span style={{ flex: 1, fontSize: 13, color: C.text }}>{item}</span>
                <button onClick={() => { setEditing(i); setEditVal(item); }} style={S.iconBtn}>✏️</button>
                <button onClick={() => remove(i)} style={S.iconBtn}>🗑️</button>
              </div>
            )
          )}
          <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder={placeholder} style={S.input} />
            <Btn onClick={add}>Add</Btn>
          </div>
        </Card>
      );
    }

    function InlineList({ items, onUpdate, placeholder }) {
      const [input, setInput] = useState("");
      const add = () => { if (!input.trim()) return; onUpdate([...items, input.trim()]); setInput(""); };
      return (
        <div>
          {items.map((item, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
              <span style={{ flex: 1, fontSize: 12, color: C.text }}>{item}</span>
              <button onClick={() => onUpdate(items.filter((_, j) => j !== i))} style={{ ...S.iconBtn, fontSize: 11 }}>🗑️</button>
            </div>
          ))}
          <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder={placeholder} style={{ ...S.input, fontSize: 12, padding: "6px 10px" }} />
            <Btn onClick={add} small>+</Btn>
          </div>
        </div>
      );
    }

    // ── MOUNT ─────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
